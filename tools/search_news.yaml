name: search_news
version: "1.0"
description: >
  Searches Hacker News stories using the Algolia search API (no key needed).
  Returns matching story titles, URLs, scores, and comment counts.
  Use for any question about recent tech, programming, security, or startup news.
executor_type: http_get
enabled: true
tags: [news, real-time, http]
config:
  url: "https://hn.algolia.com/api/v1/search"
  timeout_seconds: 6
  response_path: "hits"
  params_from_args: [query, hitsPerPage, tags]
args:
  - name: query
    type: string
    required: true
    description: "Search keywords, e.g. 'prompt injection', 'Rust 2026', 'AI agents'"
  - name: hitsPerPage
    type: integer
    required: false
    default: 5
    description: "Number of results to return (max 20)"
  - name: tags
    type: string
    required: false
    default: "story"
    description: "Filter by post type: story, comment, ask_hn, show_hn"
