name: calculator
version: "1.0"
description: >
  Safely evaluates an arithmetic expression and returns the result.
  Supports +, -, *, /, //, ** (power), % (modulo). No functions,
  variables, or strings - numbers and operators only.
  Use for any calculation request.
executor_type: python_math
enabled: true
tags: [math, offline]
args:
  - name: expression
    type: string
    required: true
    description: "Arithmetic expression, e.g. '2 ** 10 + 5' or '(100 - 32) * 5 / 9'"
