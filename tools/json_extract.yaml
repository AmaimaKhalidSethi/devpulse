name: json_extract
version: "1.0"
description: >
  Extracts or reshapes data from a JSON object using a JMESPath query.
  Use when the user provides JSON data and wants to pull out a specific
  field, filter an array, or reshape the structure.
  Example queries: "items[0].name", "people[?age > `30`].name"
executor_type: json_transform
enabled: true
tags: [data, offline]
args:
  - name: data
    type: object
    required: true
    description: "JSON object or array to query"
  - name: query
    type: string
    required: true
    description: "JMESPath expression, e.g. 'items[0].name' or 'people[?age > `30`]'"
